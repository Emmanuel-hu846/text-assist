version: '3.8'

services:
  auto-reply:
    build: .
    container_name: whatsapp_auto_reply
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ${HOME}/.wdm:/app/.wdm  # Chrome driver cache
    environment:
      - MODEL_FILE=/app/models/message_model.json
      - LOG_FILE=/app/data/interactions.json
    stdin_open: true
    tty: true
    restart: no
    networks:
      - default
