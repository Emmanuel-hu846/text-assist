version: '3.8'

services:
  auto-reply:
    build: .
    container_name: message_auto_reply
    volumes:
      - ./messages:/app/messages
      - ./logs:/app/logs
      - ./models:/app/models
    environment:
      - CONFIDENCE_THRESHOLD=0.85
      - MODEL_FILE=/app/models/message_model.json
    stdin_open: true
    tty: true
    restart: unless-stopped
    command: python3 integration_daemon.py
